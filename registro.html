<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="css/forms.css">
</head>
<body>
    <section class="main-content">
        <form action="" method="post" class="form">
            <div class="nomes">
                <div class="nome">
                    <label for="nome">Nome:</label>
                <input type="text" name="nome" class="inputs">
                </div>
                <div class="sobrenome">
                    <label for="sobrenome">Sobrenome:</label>
                <input type="text" name="sobrenome" class="inputs">
                </div>
            </div>
            <label for="cpf">CPF:</label>
            <input type="text" name="cpf" class="inputs">
            <label for="email">Email:</label>
            <input type="email" name="email" id="" class="inputs">
            <label for="senha">Senha:</label>
            <input type="password" name="senha" class="inputs">
            <input type="submit" value="Login" class="submit">
            <label for="link" class="link"><a href="login.html">Já tem conta?</a></label>
        </form>
    </section>
</body>
</html>
